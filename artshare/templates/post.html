<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./styles/main.css" />
    <link rel="stylesheet" href="./styles/post.css" />
    <link
      rel="stylesheet"
      href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css"
      integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T"
      crossorigin="anonymous"
    />
    <script
      src="https://code.jquery.com/jquery-3.3.1.slim.min.js"
      integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"
      integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"
      integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://kit.fontawesome.com/06482db709.js"
      crossorigin="anonymous"
    ></script>
    <title>{Page Title}</title>
  </head>
  <body>
    <header>
      <nav class="navbar navbar-expand-md navbar-dark bg-dark">
        <a class="navbar-brand" href="index.html">ArtShare</a>
        <button
          class="navbar-toggler"
          type="button"
          data-toggle="collapse"
          data-target="#navbarNav"
          aria-controls="navbarNav"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav">
            <li class="nav-item">
              <a class="nav-link" href="index.html">Home</a>
            </li>
            <li class="ml-sm-5">
              <form class="input-group" method="POST" action="#">
                <input
                  type="search"
                  class="form-control"
                  placeholder="Find Users"
                  aria-label="Find Users"
                  aria-describedby="button-addon2"
                />
                <div class="input-group-append">
                  <button
                    class="btn btn-light"
                    type="submit"
                    id="search-button"
                  >
                    <i class="fas fa-search"></i>
                  </button>
                </div>
              </form>
            </li>
            <li class="nav-item d-sm-block d-md-none">
              <a class="nav-link" href="/create-post.html">Create new post</a>
            </li>
            <span class="d-sm-block d-md-none">
              <li class="nav-item">
                <a class="nav-link" href="profile.html"
                  >username<span
                    ><img
                      class="avatar-image"
                      height="30px"
                      src="./assets/images/profile-image-dummy.jpg"
                      alt="user-avatar"/></span
                ></a>
              </li>
            </span>
          </ul>
          <div class="ml-auto dropdown d-none d-md-block">
            <button
              class="btn btn-secondary dropdown-toggle"
              type="button"
              id="dropdownMenuButton"
              data-toggle="dropdown"
              aria-haspopup="true"
              aria-expanded="false"
            >
              <span
                ><img
                  class="avatar-image"
                  height="30px"
                  src="./assets/images/profile-image-dummy.jpg"
                  alt="user-avatar"/></span
              >{{User name}}
            </button>
            <div
              class="dropdown-menu dropdown-menu-right"
              aria-labelledby="dropdownMenuButton"
            >
              <a class="dropdown-item" href="create-post.html"
                >Create new post</a
              >
              <a class="dropdown-item" href="profile.html">Profile</a>
            </div>
          </div>
        </div>
      </nav>
    </header>
    <main class="container">
      <div class="main-img" id="post-img">
        <img
          src="assets/images/dummy-art-5.jpg"
          alt="main-post-image"
          class="img-fluid"
        />
        <div class="actions">
          <button class="btn btn-danger">
            <i class="fas fa-heart"></i> Like
          </button>
          <button class="btn btn-primary">
            <i class="fas fa-plus"></i> Follow user
          </button>
        </div>
      </div>
      <div class="img-info" id="post-info">
        <h2 class="title">TITLE</h2>
        <p class="description">Description</p>
        <p class="post-date">
          Posted on 2020-01-01 by
          <span style="font-size: 1.0rem;"
            ><a href="./profile.html">Username</a></span
          >
          <img
            class="avatar-image"
            height="30"
            src="./assets/images/profile-image-dummy.jpg"
            alt="user-avatar"
          />
        </p>
      </div>
    </main>
    <footer></footer>
  </body>
</html>
